<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBA · Iniciar Sesión</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <link rel="apple-touch-icon" href="https://ui-avatars.com/api/?name=TBA&background=0ea5e9&color=fff&size=192">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <div class="logo-icon">
                    <i data-lucide="droplets"></i>
                </div>
                <h1>TBA</h1>
                <p class="subtitle">COMMAND CENTER</p>
            </div>

            <form id="login-form" class="login-form">
                <div class="input-group">
                    <i data-lucide="mail" class="input-icon"></i>
                    <input type="email" id="login-email" placeholder="Correo electrónico" required autocomplete="email">
                </div>
                <div class="input-group">
                    <i data-lucide="lock" class="input-icon"></i>
                    <input type="password" id="login-password" placeholder="Contraseña" required autocomplete="current-password">
                </div>
                
                <div class="error-msg" id="error-msg"></div>
                
                <button type="submit" class="btn-login" id="btn-login">
                    <span class="btn-text">Ingresar</span>
                    <div class="btn-loader" id="btn-loader"></div>
                </button>
            </form>
            
            <p class="login-footer">Plataforma de Gestión Operativa v1.0</p>
        </div>
        
        <div class="login-bg-effects">
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
        </div>
    </div>

    <!-- Firebase SDKs (v9 compat CDN) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>

    <img src="img/footer.png" alt="Ingeniería Digital por Treze Labs" style="max-height: 38px; object-fit: contain; filter: brightness(0);">
</a>

</body>
</html>
